                    <a href="teachers.html">Преподаватели</a>
                    <a href="documents.html">Подать документы</a>
                </nav>
            </div>
            <a href="index.html"><img src="photo/logo.png" alt="Логотип компании"></a>
            <div class="nav-container">
                <nav class="nav-right">
                    <a href="index.html">Главная</a>
                    <a href="contacts.html">Контакты</a>

                </nav>

            <!-- ДОДЕЛАТЬ ВХОД | РЕГИСТРАЦИЯ И СМЕНИТЬ ВЕЗДЕ ШАПКИ!!!!! -->
            <div class="login-mainheader">
                <div class="login-header">
                    <a class="login-header_1" href="login.html">Вход</a>
                    <a href="register.html">Регистрация</a>
                </div>
            </div>

        </div>
    </header>

    <main>

        <section class="section-contact">

            <div class="text-contacts">
                <h2>Личный кабинет - Вход</h2>
            </div> 

            <form class="login-form">
                <div class="login-form2">
                    <h1><a href="login.html">Вход</a></h1>
                    <h1>|</h1>
                    <h1><a href="register.html">Регистрация</a></h1>
                </div>
                <div class="form">
                    <!-- ЛОГИН -->
                    <input class="big-input" type="text" name="name" placeholder="Логин" required>
                
                    <!-- ПАРОЛЬ -->
                    <div class="password-container">
                        <label class="visually-hidden" for="password"></label>
                        <input type="password" id="password" class="password-input" placeholder="Введите пароль">
                        <button type="button" class="password-button">
                            <span class="visually-hidden password-button__text">Показать</span>
                        </button>
                    </div>
                    
                    <script src="JS/register.js"></script>
                    <!-- КНОПКА -->
                    <button class="button-login" type="submit">Войти</button>
                </div>
            </form>

        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 РГУТИС. Все права защищены.</p>
    </footer>
